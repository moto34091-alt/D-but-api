<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Viral AI Dashboard</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: #0b1220;
    color: white;
}

/* TOP BAR */
.topbar {
    background: #111a2e;
    padding: 15px 25px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.logo {
    font-weight: 700;
    font-size: 18px;
    color: #60a5fa;
}

/* CONTAINER */
.container {
    padding: 25px;
    max-width: 900px;
    margin: auto;
}

/* CARDS */
.card {
    background: #111a2e;
    padding: 20px;
    border-radius: 14px;
    margin-bottom: 15px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
}

/* PROFILE */
.profile {
    display: flex;
    align-items: center;
    gap: 15px;
}

.avatar {
    width: 50px;
    height: 50px;
    border-radius: 50%;
    background: linear-gradient(135deg, #3b82f6, #22c55e);
    display: flex;
    justify-content: center;
    align-items: center;
    font-weight: bold;
}

/* BUTTONS */
button {
    padding: 10px 14px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    margin-right: 8px;
    font-weight: 600;
    transition: 0.2s;
}

button:hover {
    transform: scale(1.05);
}

.blue { background: #3b82f6; color: white; }
.green { background: #22c55e; color: white; }
.purple { background: #a855f7; color: white; }
.red { background: #ef4444; color: white; }

/* OUTPUT */
.output {
    background: #0b1220;
    padding: 15px;
    border-radius: 10px;
    min-height: 80px;
    margin-top: 10px;
    white-space: pre-line;
}

/* LINKS */
a {
    color: #60a5fa;
    text-decoration: none;
}
a:hover {
    text-decoration: underline;
}
</style>
</head>

<body>

<!-- TOP BAR -->
<div class="topbar">
    <div class="logo">🚀 Viral AI Studio</div>
    <div>
        <a href="/settings">⚙️</a> |
        <a href="/invite">🔥</a> |
        <a href="/logout">Logout</a>
    </div>
</div>

<!-- CONTENT -->
<div class="container">

    <!-- PROFILE -->
    <div class="card profile">
        <div class="avatar">{{ user[0]|upper }}</div>
        <div>
            <h2 style="margin:0;">{{ user }}</h2>
            <p style="opacity:0.7;">👥 Referrals : {{ referrals }}</p>
        </div>
    </div>

    <!-- ACTIONS -->
    <div class="card">
        <h3>🚀 Créer du contenu viral</h3>

        <button class="blue" onclick="callAPI('/idea')">Idée</button>
        <button class="green" onclick="callAPI('/script')">Script</button>
        <button class="purple" onclick="callAPI('/title')">Titre</button>
    </div>

    <!-- OUTPUT -->
    <div class="card">
        <h3>📊 Résultat IA</h3>
        <div id="out" class="output">Clique un bouton pour générer...</div>
    </div>

</div>

<script>
async function callAPI(url){
    document.getElementById("out").innerText = "⏳ Génération..."

    try {
        let res = await fetch(url, {method:"POST"})
        let data = await res.json()

        document.getElementById("out").innerText = data.result
    } catch (e) {
        document.getElementById("out").innerText = "❌ Erreur serveur"
    }
}
</script>

</body>
</html>
