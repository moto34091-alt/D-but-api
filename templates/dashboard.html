<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body {margin:0;font-family:Inter;background:#0b1220;color:white;}

.header {
    background:#111a2e;
    padding:12px;
    text-align:center;
    font-weight:700;
    color:#60a5fa;
}

.container {padding:15px;}

.card {
    background:#111a2e;
    padding:15px;
    border-radius:12px;
    margin-bottom:10px;
}

button {
    width:100%;
    padding:12px;
    margin-top:8px;
    border:none;
    border-radius:10px;
    font-weight:600;
}

.blue{background:#3b82f6;color:white;}
.green{background:#22c55e;color:white;}
.purple{background:#a855f7;color:white;}

.output {
    background:#0b1220;
    padding:10px;
    border-radius:10px;
    min-height:80px;
    font-size:14px;
    white-space:pre-line;
}

a {color:#60a5fa;text-decoration:none;}
</style>
</head>

<body>

<div class="header">🎬 TikTok Creator</div>

<div class="container">

<div class="card">
👤 {{ user }} <br>
👥 Referrals: {{ referrals }}
</div>

<div class="card">
<button class="blue" onclick="call('/idea')">💡 Idée</button>
<button class="green" onclick="call('/script')">🎬 Script</button>
<button class="purple" onclick="call('/title')">🔥 Titre</button>

<button class="blue" onclick="call('/viral_10')">🚀 10 POSTS VIRALS</button>
</div>

<div class="card">
<div id="out" class="output">Résultat...</div>
</div>

<div class="card">
<a href="/invite">🔥 Parrainage</a><br>
<a href="/settings">⚙️ Paramètres</a><br>
<a href="/logout" style="color:red;">🚪 Logout</a>
</div>

</div>

<script>
async function call(url){
document.getElementById("out").innerText="⏳..."

let r = await fetch(url,{method:"POST"})
let d = await r.json()

document.getElementById("out").innerText=d.result
}
</script>

</body>
</html>
