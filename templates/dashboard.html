<h1>Bienvenue {{ user }}</h1>

<button onclick="call('/idea')">Idée</button>
<button onclick="call('/script')">Script</button>
<button onclick="call('/title')">Titre</button>

<p id="out">Résultat ici...</p>

<br>
<a href="/logout">Logout</a>

<script>
async function call(url){
    document.getElementById("out").innerText = "Chargement..."

    let res = await fetch(url,{method:"POST"})
    let data = await res.json()

    document.getElementById("out").innerText = data.result
}
</script>
